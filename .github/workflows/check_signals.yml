name: Trading Signals Daily Check

on:
  schedule:
    # Run every day at 02:00 UTC (which is 09:00 AM Bangkok time)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows manual run for testing

jobs:
  check-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r trading_signals/requirements.txt

      - name: Run Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python trading_signals/trading_signals.py
